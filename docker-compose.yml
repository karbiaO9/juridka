services:
  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: avocat-backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "4000:4000"
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    container_name: avocat-frontend
    restart: always
    ports:
      - "3001:80"
    depends_on:
      - backend
